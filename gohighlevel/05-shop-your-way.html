<!-- SECTION 05: Shop Your Way. Final category images are still required; each slot has a stable data-image-id. -->
<section id="shop-your-way" class="wbj wbj-section wbj-shop" aria-labelledby="wbj-shop-title">
  <div class="wbj-shell">
    <div class="wbj-shop__heading">
      <p class="wbj-eyebrow">Find your direction</p>
      <h2 id="wbj-shop-title">Shop Your Way</h2>
    </div>

    <div class="wbj-tabs" role="tablist" aria-label="Shop your way" data-wbj-tabs>
      <button id="wbj-tab-length" type="button" role="tab" aria-selected="true" aria-controls="wbj-panel-length">Shop by Length</button>
      <button id="wbj-tab-color" type="button" role="tab" aria-selected="false" aria-controls="wbj-panel-color" tabindex="-1">Shop by Color</button>
      <button id="wbj-tab-hair" type="button" role="tab" aria-selected="false" aria-controls="wbj-panel-hair" tabindex="-1">Shop by Hair Type</button>
    </div>

    <div id="wbj-panel-length" class="wbj-shop__panel" role="tabpanel" aria-labelledby="wbj-tab-length">
      <div class="wbj-shop__grid">
        <figure class="wbj-shop__card"><div class="wbj-shop__image" data-image-id="length-short" aria-hidden="true"></div><figcaption>Short (Under 16”)</figcaption></figure>
        <figure class="wbj-shop__card"><div class="wbj-shop__image" data-image-id="length-mid" aria-hidden="true"></div><figcaption>Mid (17”–20”)</figcaption></figure>
        <figure class="wbj-shop__card"><div class="wbj-shop__image" data-image-id="length-long" aria-hidden="true"></div><figcaption>Long (21”–25”)</figcaption></figure>
        <figure class="wbj-shop__card"><div class="wbj-shop__image" data-image-id="length-extra-long" aria-hidden="true"></div><figcaption>Extra Long (26”+)</figcaption></figure>
      </div>
    </div>

    <div id="wbj-panel-color" class="wbj-shop__panel" role="tabpanel" aria-labelledby="wbj-tab-color" hidden>
      <div class="wbj-shop__grid">
        <figure class="wbj-shop__card"><div class="wbj-shop__image wbj-shop__image--square" data-image-id="color-black" aria-hidden="true"></div><figcaption>Black</figcaption></figure>
        <figure class="wbj-shop__card"><div class="wbj-shop__image wbj-shop__image--square" data-image-id="color-dark-brown" aria-hidden="true"></div><figcaption>Dark Brown</figcaption></figure>
        <figure class="wbj-shop__card"><div class="wbj-shop__image wbj-shop__image--square" data-image-id="color-medium-brown" aria-hidden="true"></div><figcaption>Medium Brown</figcaption></figure>
        <figure class="wbj-shop__card"><div class="wbj-shop__image wbj-shop__image--square" data-image-id="color-light-brown" aria-hidden="true"></div><figcaption>Light Brown</figcaption></figure>
        <figure class="wbj-shop__card"><div class="wbj-shop__image wbj-shop__image--square" data-image-id="color-red" aria-hidden="true"></div><figcaption>Red</figcaption></figure>
        <figure class="wbj-shop__card"><div class="wbj-shop__image wbj-shop__image--square" data-image-id="color-blonde" aria-hidden="true"></div><figcaption>Blonde</figcaption></figure>
        <figure class="wbj-shop__card"><div class="wbj-shop__image wbj-shop__image--square" data-image-id="color-grey" aria-hidden="true"></div><figcaption>Grey</figcaption></figure>
        <figure class="wbj-shop__card"><div class="wbj-shop__image wbj-shop__image--square" data-image-id="color-salt-and-pepper" aria-hidden="true"></div><figcaption>Salt and Pepper</figcaption></figure>
      </div>
    </div>

    <div id="wbj-panel-hair" class="wbj-shop__panel" role="tabpanel" aria-labelledby="wbj-tab-hair" hidden>
      <div class="wbj-shop__grid wbj-shop__grid--three">
        <figure class="wbj-shop__card"><div class="wbj-shop__image wbj-shop__image--wide" data-image-id="hair-processed-european" aria-hidden="true"></div><figcaption>Processed European</figcaption></figure>
        <figure class="wbj-shop__card"><div class="wbj-shop__image wbj-shop__image--wide" data-image-id="hair-premium-processed" aria-hidden="true"></div><figcaption>Premium Processed</figcaption></figure>
        <figure class="wbj-shop__card"><div class="wbj-shop__image wbj-shop__image--wide" data-image-id="hair-virgin-european" aria-hidden="true"></div><figcaption>Virgin European</figcaption></figure>
      </div>
    </div>
  </div>
</section>
